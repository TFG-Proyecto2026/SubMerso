# Server Configuration
server.port=8085

# MongoDB Configuration (Atlas: MONGO_URI en .env; o application-local.properties con perfil "local")
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=submerso_db

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.com.submerso=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS (puerto de Angular: 4200, 5173, 3000)
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200
