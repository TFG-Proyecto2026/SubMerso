# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/submerso
spring.data.mongodb.database=submerso

# JWT Configuration
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.com.submerso=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173
