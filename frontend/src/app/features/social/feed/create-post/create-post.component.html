<div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden mb-6">
    <div class="p-4 border-b border-gray-100 bg-gray-50">
        <h2 class="text-lg font-semibold text-gray-800">
            <i class="bi bi-pencil-square mr-2 text-ocean-600"></i>Crear publicación
        </h2>
    </div>

    <div class="p-4">
        @if (errorMessage()) {
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
                <i class="bi bi-exclamation-triangle mr-2"></i>{{ errorMessage() }}
            </div>
        }

        <form [formGroup]="postForm" (ngSubmit)="onSubmit()">

      <textarea
              formControlName="caption"
              class="w-full border-none focus:ring-0 resize-none text-gray-700 placeholder-gray-400 p-2 text-lg"
              rows="3"
              placeholder="¿Qué inmersión quieres compartir hoy?..."
      ></textarea>

            @if (imagePreview()) {
                <div class="relative mt-3 rounded-lg overflow-hidden border border-gray-200 bg-gray-50 inline-block">
                    <img [src]="imagePreview()" alt="Preview" class="max-h-64 object-contain">
                    <button
                            type="button"
                            (click)="removeImage()"
                            class="absolute top-2 right-2 bg-gray-900 bg-opacity-70 text-white rounded-full p-1.5 hover:bg-red-600 transition-colors">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            }

            <hr class="my-4 border-gray-100">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="relative">
          <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">
            <i class="bi bi-geo-alt"></i>
          </span>
                    <input
                            type="text"
                            formControlName="location"
                            class="input-ocean pl-10 text-sm w-full bg-gray-50 border-gray-200 rounded-lg py-2"
                            placeholder="Añadir ubicación (Ej: Cabo de Palos)"
                    />
                </div>

                <div class="relative">
          <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">
            <i class="bi bi-hash"></i>
          </span>
                    <input
                            type="text"
                            formControlName="tags"
                            class="input-ocean pl-10 text-sm w-full bg-gray-50 border-gray-200 rounded-lg py-2"
                            placeholder="Etiquetas separadas por comas"
                    />
                </div>
            </div>

            <div class="flex items-center justify-between mt-2">

                <div>
                    <input
                            type="file"
                            #fileInput
                            (change)="onFileSelected($event)"
                            accept="image/*"
                            class="hidden"
                    >
                    <button
                            type="button"
                            (click)="fileInput.click()"
                            class="text-ocean-600 bg-ocean-50 hover:bg-ocean-100 px-4 py-2 rounded-full text-sm font-medium transition-colors">
                        <i class="bi bi-image mr-1"></i> Añadir foto
                    </button>
                </div>

                <button
                        type="submit"
                        [disabled]="isLoading() || !selectedFile() || postForm.invalid"
                        class="btn-ocean px-6 py-2 rounded-full font-medium transition-all"
                        [class.opacity-50]="isLoading() || !selectedFile() || postForm.invalid"
                        [class.cursor-not-allowed]="isLoading() || !selectedFile() || postForm.invalid"
                >
                    @if (isLoading()) {
                        <span class="animate-spin mr-2 inline-block"><i class="bi bi-arrow-repeat"></i></span>
                        Publicando...
                    } @else {
                        Publicar
                    }
                </button>
            </div>

        </form>
    </div>
</div>
