<!-- Burbujas continuas solo en esta página -->
<div class="home-bubbles" aria-hidden="true">
  @for (b of bubbles; track $index) {
    <span class="home-bubble"
          [style.animation-duration]="b.duration + 's'"
          [style.animation-delay]="b.delay + 's'"
          [style.left]="b.left + '%'"
          [style.width.px]="b.size"
          [style.height.px]="b.size"></span>
  }
</div>

<section class="home-panels flex min-h-[calc(100vh-4rem)]">
  <!-- Panel Viajar → imagen buzo -->
  <a [routerLink]="['/marketplace']" 
     class="panel panel-viajar flex-1 flex flex-col justify-center items-center p-6 text-white no-underline transition-all duration-300 hover:flex-[1.15]">
    <span class="panel-label">Viajar</span>
  </a>

  <!-- Panel Logbook → imagen planta -->
  <a [routerLink]="['/logbook']" 
     class="panel panel-logbook flex-1 flex flex-col justify-center items-center p-6 text-white no-underline transition-all duration-300 hover:flex-[1.15]">
    <span class="panel-label">Logbook</span>
  </a>

  <!-- Panel FedSocial → imagen social -->
  <a [routerLink]="['/feed']" 
     class="panel panel-feedsocial flex-1 flex flex-col justify-center items-center p-6 text-white no-underline transition-all duration-300 hover:flex-[1.15] relative">
    <span class="panel-label">FedSocial</span>
    <i class="bi bi-stars text-2xl md:text-3xl absolute bottom-6 right-6 opacity-90"></i>
  </a>
</section>
